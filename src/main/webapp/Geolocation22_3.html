<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geolocation22_3.html</title>
    <style>
        fieldset{
          margin:0 auto;
          width: 70%; 
          text-align: center;
          font-size:.8em
        }
        fieldset legend{
          border: yellowgreen solid 2px;
          border-radius: 10px;
          padding:5px 10px;
        }



    </style>
</head>
<body>
    <!--
       카카오 지도 API 자바스크립트 앱 키
    1. https://developers.kakao.com/
        카카오 개발자 
    2. 앱 -> 앱 생성 버튼 클릭 -> 앱이름.회사명.카테고리(지도/네비게이션) 입력 후 저장 버튼 클릭 
    
    3. 생성된 어플리케이션 클릭 후 3바 메뉴->앱 -> 플랫폼 키-> 자바스크립트 앱 키 복사
	
	4.[대표]Default JS Key 클릭
	JavaScript SDK 도메인 섹션에
	비주얼 스튜디오 실해한 URL주소 복사해서 붙여 넣기
	예: http://127.0.0.1:5500
	끝에 /는  제거한다
	 
    
    현재는 http 지원하지 않는다
    https만 지원한다
    사이트 도메인에 터널 프로그램(ngrok)으로 생성된 주소를 넣는다
    그 다음부터 문서에서 API사용법 보고 진행(문서->개발하기 섹션의 "kakao Maps API" 텍스트 클릭(https://apis.map.kakao.com/)-> Web 이미지 클릭)

    5.3바 메뉴 -> [카카오맵] ->[사용 설정]의 [상태]를 [ON]으로 설정

    앱 삭제시는 3바 메뉴 -> 앱->일반 클릭-> 앱 삭제 섹션의  [앱 영구 삭제] 클릭해서 삭제
    혹은 
    상단 앱 메뉴 -> 비즈니스 섹션의 [비즈 앱 등록]클릭 -> 앱 삭제 섹션의  [앱 영구 삭제] 클릭
	-->
    <fieldset>
        <legend id="main">&nbsp;현재 위치를 지도에 표시하기&nbsp;</legend>
        <div id="map" style="height:500px;border-radius:20px;overflow:hidden;"></div>
        지도 레벨 : <input type="range" min="1" max="14" value="3" id="range"/>
    </fieldset>
    <hr style="width:70%"/> 
    <fieldset>
    <legend>주소로 위치 찾기</legend>
        <div>
        <input id='address' type='search' placeholder="주소를 입력하세요" autofocus list="data_list"/>
        <datalist id="data_list">
            <option value="가산디지털2로 123 월드메르디앙2차"></option>
            <option value="가로수길 5"></option>
            <option value="벚꽃로 309 가산디지털단지역"></option>
            <option value="양화로 160 홍대입구역"></option>
            <option value="한강대로 405 서울역"></option>
        </datalist>
        <button onclick='searchByAddress()'>주소찾기</button>      
        <button onclick='zoomIn()'>줌인</button>
        <button onclick='zoomOut()'>줌아웃</button>
        현재 지도 레벨은 <span id="maplevel" style="font-weight:bold;font-size:1.4em;color:green"></span>레벨.    
        </div>
    </fieldset>
    <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=본인APIKEY&libraries=services"></script>
    <script>
        /*
        //지도를 띄우는 코드 작성
        var container = document.getElementById('map'); //지도를 담을 영역의 DOM 레퍼런스
        var options = { //지도를 생성할 때 필요한 기본 옵션
            center: new kakao.maps.LatLng(33.450701, 126.570667), //지도의 중심좌표.
            level: 3 //지도의 레벨(확대, 축소 정도)
        };

        var map = new kakao.maps.Map(container, options); //지도 생성 및 객체 리턴
        */
        var map;
        var markers=[];
        var range=document.querySelector('#range');
        var maplevel = document.querySelector('#maplevel');
        var address = document.querySelector('#address');
        var container= document.querySelector('#map');

        //페이지 최초 로드시 range의 기본값으로 지도레벨 표시하기
        maplevel.textContent=range.value;
        range.addEventListener('input',e=>{
            //console.log('지도의 확대레벨:',map.getLevel());
            if(map) map.setLevel(parseInt(e.target.value));
            //span의 지도레벨 갱신
            maplevel.textContent=e.target.value;

        });

        if(navigator.geolocation){
            
            
            navigator.geolocation.getCurrentPosition(position=>{
                //현재 위치의 위도/경도 얻기
                var lat = position.coords.latitude;
                var lng = position.coords.longitude;
                //1.지도 생성
                map=getKakaoMap(lat,lng);
                //2.지도에 마커 표시하기 :Sample - 오버레이-마커생성하기
                var content = '<div style="padding:10px;text-align:center;font-weight:bold;width:200px;border:2px red solid;border-radius:5px;">현재 나의 위치</div>'; // 인포윈도우에 표출될 내용으로 HTML 문자열이나 document element가 가능합니다
                
                setMarker(lat,lng,content);

            });
        }/////if
        //카카오 맵 객체 반환하는 함수
        function getKakaoMap(lat,lng){
            var options = { //지도를 생성할 때 필요한 기본 옵션
                center: new kakao.maps.LatLng(lat,lng), //지도의 중심좌표.
                level: range.value, //지도의 레벨(확대, 축소 정도)
                mapTypeId:kakao.maps.MapTypeId.ROADMAP,//지도 종류 (ROADMAP : 일반 지도(기본값)),SKYVIEW(위성),HYBRID(위성+레이블)
            };

            return new kakao.maps.Map(container, options); //지도 생성 및 객체 리턴
        }/////////////getKakaoMap

        //마커표시 함수
        function setMarker(lat,lng,content){
            // 마커가 표시될 위치입니다 
            var markerPosition  = new kakao.maps.LatLng(lat, lng); 

            // 마커를 생성합니다
            var marker = new kakao.maps.Marker({
                position: markerPosition
            });

            // 마커가 지도 위에 표시되도록 설정합니다
            marker.setMap(map);

            // 아래 코드는 지도 위의 마커를 제거하는 코드입니다
            // marker.setMap(null); 

           
            // 인포윈도우를 생성합니다
            var infowindow = new kakao.maps.InfoWindow({
                content : content
            });

            // 마커에 마우스오버 이벤트를 등록합니다
            kakao.maps.event.addListener(marker, 'mouseover', function() {
                // 마커에 마우스오버 이벤트가 발생하면 인포윈도우를 마커위에 표시합니다
                infowindow.open(map, marker);
            });

            // 마커에 마우스아웃 이벤트를 등록합니다
            kakao.maps.event.addListener(marker, 'mouseout', function() {
                // 마커에 마우스아웃 이벤트가 발생하면 인포윈도우를 제거합니다
                infowindow.close();
            });

            //생성된 마커 객체를 배열에 저장
            //마커 객체와 해당 마커의 인포 윈도우 객체를 함께 저장 
            markers.push({'marker':marker,'info':infowindow});   

        }

        
        //<주소 찾기>
        //Sample - 라이브러리 - 주소로 장소표시하기
        //(준비사항-script태그의 src속성에 &libraries=services추가)
        //주소찾기 버튼 클릭시 해당 주소로 지도의 중심 좌표 이동시키기

        function searchByAddress(){
            // 주소-좌표 변환 객체를 생성합니다
            var geocoder = new kakao.maps.services.Geocoder();

            // 한글 주소로 좌표를 검색합니다
            geocoder.addressSearch(address.value, function(result, status) {

                // 정상적으로 검색이 완료됐으면 
                if (status === kakao.maps.services.Status.OK) {
                    var lat=result[0].y;
                    var lng=result[0].x;
                    // 결과값으로 받은 위치를 마커로 표시합니다
                    var content = `<div style="padding:10px;text-align:center;font-weight:bold;width:200px;border:2px red solid;border-radius:5px;">${address.value}</div>`;
                    setMarker(lat,lng,content);
                    // 지도의 중심을 결과값으로 받은 위치로 이동시킵니다
                    map.setCenter(new kakao.maps.LatLng(lat,lng));
                } 
                else{
                    alert(`${address.value}와 일치하는 주소가 없어요`);
                    address.value='';
                    address.focus();
                }
            }); 
        }
        //지도 레벨 확대(숫자가 작을 수록 확대됨)
        function zoomIn(){
            // 현재 지도의 레벨( 1 ~ 14)을 얻어옵니다 
            if(map){
                var level= map.getLevel();
                if(level ===1) return;
                // 지도를 1레벨 내립니다 (지도가 확대됩니다)
                map.setLevel(level-1);
                range.value=level-1;
                maplevel.textContent=level-1;
            }   
        }
        //지도 레벨 축소
        function zoomOut(){
            // 현재 지도의 레벨( 1 ~ 14)을 얻어옵니다 
            if(map){
                var level= map.getLevel();
                if(level ===parseInt(range.max)) return;
                // 지도를 1레벨 올립니다 (지도가 축소됩니다)
                map.setLevel(level+1);
                range.value=level+1;
                maplevel.textContent=level+1;
            }   
        }
    </script>
    
</body>
</html>
